services:
  postgres:
    image: postgres:16
    container_name: utalk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: utalk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55432:5432"
    volumes:
      - utalk_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utalk"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: utalk-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - utalk_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  utalk_pg_data:
  utalk_redis_data:
